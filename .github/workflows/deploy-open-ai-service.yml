name: Open AI Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
  pull_request:
    branches:
      - main
      - 'feature/**'
  
jobs:

  pr-verification:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: 'Az CLI login'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest

      - name: Set Terraform Environment Variables
        run: |
          echo "TF_VAR_subscription_id=${{ secrets.SUBSCRIPTION_ID }}" >> $GITHUB_ENV
      
      - name: Run TFLint
        id: tflint
        run: |
          set -o pipefail
          tflint --init
          tflint --format=compact 2>&1 | tee /tmp/tflint_output.txt
        continue-on-error: true

      - name: Terraform Format Check
        id: fmt
        run: |
          set -o pipefail
          terraform fmt -check -recursive 2>&1 | tee /tmp/fmt_output.txt
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: |
          set -o pipefail
          terraform validate 2>&1 | tee /tmp/validate_output.txt
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        timeout-minutes: 10
        if: steps.tflint.outcome == 'success' && steps.fmt.outcome == 'success' && steps.validate.outcome == 'success'
        run: terraform plan -no-color
        continue-on-error: false
      
      - name: Update Pull Request
        uses: actions/github-script@v6
        if: always() && github.event_name == 'pull_request'
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Trigger Copilot Coding Agent on validation failure
        id: copilot-trigger
        if: always() && (steps.tflint.outcome == 'failure' || steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure')
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.COPILOT_TRIGGER_PAT }}
          script: |
            const fs = require('fs');

            core.setOutput('triggerTimestamp', new Date().toISOString());

            const readOutput = (filePath) => {
              try {
                return fs.readFileSync(filePath, 'utf8').trim() || 'No output captured';
              } catch(e) {
                return 'Output not available';
              }
            };

            let errorDetails = '';

            if ('${{ steps.tflint.outcome }}' === 'failure') {
              const output = readOutput('/tmp/tflint_output.txt');
              errorDetails += `### TFLint Errors\n\`\`\`\n${output}\n\`\`\`\n\n`;
            }

            if ('${{ steps.fmt.outcome }}' === 'failure') {
              const output = readOutput('/tmp/fmt_output.txt');
              errorDetails += `### Terraform Format Errors\nRun \`terraform fmt -recursive\` to fix the formatting:\n\`\`\`\n${output}\n\`\`\`\n\n`;
            }

            if ('${{ steps.validate.outcome }}' === 'failure') {
              const output = readOutput('/tmp/validate_output.txt');
              errorDetails += `### Terraform Validate Errors\n\`\`\`\n${output}\n\`\`\`\n\n`;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha ? context.sha.substring(0, 7) : 'unknown';
            const pr = context.payload.pull_request;
            if (!pr) {
              core.warning('No pull_request context found; skipping Copilot trigger.');
              return;
            }
            const sourceBranch = pr.head.ref;
            const prNumber = pr.number;

            const commentBody = [
              '## ❌ Terraform Validation Failed – Automated Fix Requested',
              '',
              `The following checks failed for commit \`${sha}\` in this pull request.`,
              '',
              `- **Source branch:** \`${sourceBranch}\``,
              `- **Workflow run:** [View logs](${runUrl})`,
              '',
              errorDetails,
              '---',
              `@copilot Please analyze the errors above and fix them. Create a new branch derived from \`${sourceBranch}\` and open a pull request targeting \`${sourceBranch}\` with the necessary fixes, so that once the fix is merged the original pull request passes all validation checks.`
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              core.notice(`Copilot Coding Agent triggered via comment on PR #${prNumber}`);
            } catch(e) {
              core.warning(`Failed to post PR comment: ${e.message}`);
            }

            core.setFailed('Terraform validation checks failed. Copilot Coding Agent has been triggered via a PR comment to fix the errors automatically.');

      - name: Post Copilot run link
        if: always() && (steps.tflint.outcome == 'failure' || steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure')
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.notice('No pull_request context found; skipping Copilot run link comment.');
              return;
            }
            const prNumber = pr.number;
            const triggerTimestamp = '${{ steps.copilot-trigger.outputs.triggerTimestamp }}';
            if (!triggerTimestamp) {
              core.notice('No trigger timestamp available; skipping Copilot run link comment.');
              return;
            }
            const triggerTime = new Date(triggerTimestamp);

            async function sleep(ms) {
              return new Promise(r => setTimeout(r, ms));
            }

            let copilotRunUrl = null;
            const maxAttempts = 8;
            const intervalMs = 15000;

            for (let i = 0; i < maxAttempts; i++) {
              if (i > 0) await sleep(intervalMs);

              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event: 'dynamic',
                per_page: 10
              });

              const run = data.workflow_runs.find(r => new Date(r.created_at) >= triggerTime);
              if (run) {
                copilotRunUrl = run.html_url;
                break;
              }
            }

            if (copilotRunUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🤖 **Copilot is now processing the fix** – [View Copilot agent run](${copilotRunUrl})`
              });
              core.notice(`Posted Copilot run link: ${copilotRunUrl}`);
            } else {
              core.notice('Copilot run not found within timeout; skipping follow-up comment.');
            }

  verification:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Check required GitHub secrets and tfvars variables
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════╗"
          echo "║           GitHub Secrets & terraform.auto.tfvars Check              ║"
          echo "╠══════════════════════════════════════════════════════════════════════╣"
          missing=0

          # Check each secret explicitly
          if [ -z "${{ secrets.CLIENT_ID }}" ]; then
            printf "║ %-40s ❌ MISSING ║\n" "CLIENT_ID"
            missing=1
          else
            printf "║ %-40s ✅ OK      ║\n" "CLIENT_ID"
          fi

          if [ -z "${{ secrets.TENANT_ID }}" ]; then
            printf "║ %-40s ❌ MISSING ║\n" "TENANT_ID"
            missing=1
          else
            printf "║ %-40s ✅ OK      ║\n" "TENANT_ID"
          fi

          if [ -z "${{ secrets.SUBSCRIPTION_ID }}" ]; then
            printf "║ %-40s ❌ MISSING ║\n" "SUBSCRIPTION_ID"
            missing=1
          else
            printf "║ %-40s ✅ OK      ║\n" "SUBSCRIPTION_ID"
          fi

          echo "╚══════════════════════════════════════════════════════════════════════╝"

          if [ "$missing" -eq 1 ]; then
            echo "❌ Some required secrets are missing."
            exit 1
          else
            echo "✅ All required secrets are set."
          fi

          # Check tfvars variables
          for var in cognitive_account_kind cognitive_account_name cognitive_account_sku_name cognitive_deployment_model_format cognitive_deployment_model_name cognitive_deployment_model_version cognitive_deployment_name cognitive_deployment_sku_name cognitive_deployment_sku_capacity resource_group_location resource_group_name; do
            if grep -q "^$var" terraform.auto.tfvars; then
              printf "║ %-40s ✅ OK      ║\n" "$var"
            else
              printf "║ %-40s ❌ MISSING ║\n" "$var"
              missing=1
            fi
          done

          echo "╚══════════════════════════════════════════════════════════════════════╝"

          if [ "$missing" -eq 1 ]; then
            echo "❌ Some required secrets or tfvars variables are missing."
            exit 1
          else
            echo "✅ All required secrets and tfvars variables are set."
          fi

      - name: 'Az CLI login'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Check if the storage account exists
        run: az storage account show --name azureworkshopdemostorage --resource-group azureworkshop-demo-rg

  create-plan:
    if: github.event.inputs.action == 'deploy'
    needs: verification
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: 'Az CLI login'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Set Terraform Environment Variables
        run: |
          echo "TF_VAR_subscription_id=${{ secrets.SUBSCRIPTION_ID }}" >> $GITHUB_ENV
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest

      - name: Run TFLint
        id: tflint
        run: |
          set -o pipefail
          tflint --init
          tflint --format=compact 2>&1 | tee /tmp/tflint_output.txt
        continue-on-error: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Format Check
        id: fmt
        run: |
          set -o pipefail
          terraform fmt 2>&1 | tee /tmp/fmt_output.txt
        continue-on-error: true

      - name: Terraform Initialize 
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: |
          set -o pipefail
          terraform validate 2>&1 | tee /tmp/validate_output.txt
        continue-on-error: true

      - name: Trigger Copilot Coding Agent on validation failure
        if: always() && (steps.tflint.outcome == 'failure' || steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure')
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const readOutput = (filePath) => {
              try {
                return fs.readFileSync(filePath, 'utf8').trim() || 'No output captured';
              } catch(e) {
                return 'Output not available';
              }
            };

            let errorDetails = '';

            if ('${{ steps.tflint.outcome }}' === 'failure') {
              const output = readOutput('/tmp/tflint_output.txt');
              errorDetails += `### TFLint Errors\n\`\`\`\n${output}\n\`\`\`\n\n`;
            }

            if ('${{ steps.fmt.outcome }}' === 'failure') {
              const output = readOutput('/tmp/fmt_output.txt');
              errorDetails += `### Terraform Format Errors\nRun \`terraform fmt\` to apply the formatting:\n\`\`\`\n${output}\n\`\`\`\n\n`;
            }

            if ('${{ steps.validate.outcome }}' === 'failure') {
              const output = readOutput('/tmp/validate_output.txt');
              errorDetails += `### Terraform Validate Errors\n\`\`\`\n${output}\n\`\`\`\n\n`;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha ? context.sha.substring(0, 7) : 'unknown';
            const branch = context.ref.replace('refs/heads/', '');

            const issueBody = [
              '## Automated Fix Request',
              '',
              'The following Terraform validation checks failed in the CI pipeline.',
              '',
              `- **Branch:** \`${branch}\``,
              `- **Commit:** \`${sha}\``,
              `- **Workflow run:** [View logs](${runUrl})`,
              '',
              'Please analyze the errors below and create a pull request with the necessary fixes.',
              '',
              errorDetails,
              '---',
              '*This issue was automatically created by the CI pipeline.*',
              '',
              '@copilot please fix the Terraform validation errors listed above.'
            ].join('\n');

            let issue;
            try {
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Automated Fix] Terraform validation errors - ${sha}`,
                body: issueBody
              });
              core.notice(`Copilot Coding Agent issue created: ${issue.data.html_url}`);
            } catch(e) {
              core.warning(`Failed to create issue: ${e.message}`);
            }

            if (issue) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.data.number,
                  assignees: ['copilot']
                });
              } catch(e) {
                core.warning(`Could not assign issue to Copilot: ${e.message}`);
              }
            }

            core.setFailed('Terraform validation checks failed. A Copilot Coding Agent issue has been created to fix the errors automatically.');

      - name: Terraform Plan
        if: steps.tflint.outcome == 'success' && steps.fmt.outcome == 'success' && steps.validate.outcome == 'success'
        timeout-minutes: 10
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1
      
  deploy:
    needs: create-plan
    runs-on: ubuntu-latest
    environment: production 
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: 'Az CLI login'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}
      
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
   
      - name: Set Terraform Environment Variables
        run: |
          echo "TF_VAR_subscription_id=${{ secrets.SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan
        timeout-minutes: 10

      - name: Generate Job Summary
        if: always()
        run: |
          echo "# 🚀 Azure Cognitive Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Terraform Apply Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.apply.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner OS**: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.apply.outcome }}" == "success" ]; then
            echo "✅ **Deployment completed successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed**" >> $GITHUB_STEP_SUMMARY
          fi

  destroy:
    if: github.event.inputs.action == 'destroy'
    needs: verification
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: 'Az CLI login'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Set Terraform Environment Variables
        run: |
          echo "TF_VAR_subscription_id=${{ secrets.SUBSCRIPTION_ID }}" >> $GITHUB_ENV
      
      - name: Terraform Initialize 
        run: terraform init   

      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve

      - name: Generate Job Summary
        if: always()
        run: |
          echo "# 🗑️ Azure Cognitive Destruction Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Destruction Details" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Terraform Destroy Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.destroy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner OS**: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.destroy.outcome }}" == "success" ]; then
            echo "✅ **Resources destroyed successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Destruction failed**" >> $GITHUB_STEP_SUMMARY
          fi